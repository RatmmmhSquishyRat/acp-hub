# cargo-deny policy for supply-chain / license hygiene.
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "OpenSSL",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "MPL-2.0",
  "0BSD",
  "BSL-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
  # Unpublished ACP test harness (integration-tests only) + [patch.crates-io]
  # alignment for local/CI type identity. Published crates never depend on git.
  "https://github.com/agentclientprotocol/rust-sdk",
]
