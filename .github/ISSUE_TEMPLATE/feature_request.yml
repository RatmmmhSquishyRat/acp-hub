name: Feature request
description: Propose a concrete enhancement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended brainstorming, prefer [Discussions → Ideas](https://github.com/RatmmmhSquishyRat/acp-hub/discussions/categories/ideas).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Desired behavior, CLI shape if relevant. Must not invent flags that contradict live `--help`.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / MCP
        - Hub core / daemon
        - Adapters
        - Docs / skill
        - CI / release
        - Other
    validations:
      required: true
