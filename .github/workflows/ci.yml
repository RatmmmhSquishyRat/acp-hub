name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # rusqlite (bundled SQLite) and aws-lc-rs (via reqwest+rustls) build
      # from C source and need a C toolchain + cmake.
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets

      - name: test
        run: cargo test --workspace
