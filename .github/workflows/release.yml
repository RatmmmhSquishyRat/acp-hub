name: release

# On tag v*:
# 1) Build cross-platform release binaries → GitHub Release
# 2) Publish acp-hub-core then acp-hub-cli to crates.io
#
# Hyphenated tags (e.g. v0.1.0-rc1) are GitHub prereleases and skip crates.io
# (crates.io has no prerelease channel; yanking is the only undo).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - runner: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install native build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        env:
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.target == 'x86_64-apple-darwin' && 'x86_64' || '' }}
        run: cargo build --release --locked --target ${{ matrix.target }} --package acp-hub-cli

      - name: Smoke test the binary
        run: target/${{ matrix.target }}/release/acp-hub${{ matrix.archive == 'zip' && '.exe' || '' }} --version

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf acp-hub-${{ github.ref_name }}-${{ matrix.target }}.tar.gz acp-hub
          shasum -a 256 acp-hub-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > acp-hub-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Push-Location target/${{ matrix.target }}/release
          7z a acp-hub-${{ github.ref_name }}-${{ matrix.target }}.zip acp-hub.exe
          (Get-FileHash acp-hub-${{ github.ref_name }}-${{ matrix.target }}.zip -Algorithm SHA256).Hash |
            Out-File -Encoding ascii -NoNewline acp-hub-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256
          Pop-Location

      - uses: actions/upload-artifact@v4
        with:
          name: acp-hub-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/acp-hub-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  crates-io:
    name: publish crates.io
    # Stable releases only (no hyphen in tag). Requires repo secret CARGO_REGISTRY_TOKEN.
    if: ${{ !contains(github.ref_name, '-') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential

      - uses: Swatinem/rust-cache@v2
        with:
          key: crates-io-publish

      - name: Check tag matches package versions
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CORE_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/hub/Cargo.toml | head -1)
          CLI_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/cli/Cargo.toml | head -1)
          echo "tag=$TAG core=$CORE_VER cli=$CLI_VER"
          test "$TAG" = "$CORE_VER"
          test "$TAG" = "$CLI_VER"

      # CLI cannot dry-run until core exists on crates.io (path→version rewrite).
      - name: Dry-run publish acp-hub-core
        run: cargo publish -p acp-hub-core --dry-run --locked

      - name: Publish acp-hub-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p acp-hub-core --locked

      - name: Wait for crates.io index to list acp-hub-core
        run: |
          set -e
          for i in $(seq 1 24); do
            if cargo search acp-hub-core --limit 1 2>/dev/null | grep -q 'acp-hub-core'; then
              echo "index ready (attempt $i)"
              exit 0
            fi
            echo "waiting for index (attempt $i)..."
            sleep 15
          done
          echo "index still not ready; continuing anyway"
          exit 0

      - name: Publish acp-hub-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          for i in $(seq 1 6); do
            if cargo publish -p acp-hub-cli --locked; then
              exit 0
            fi
            echo "publish cli failed (attempt $i); retry in 20s"
            sleep 20
          done
          exit 1